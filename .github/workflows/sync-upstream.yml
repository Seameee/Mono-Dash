name: Sync from Upstream

on:
  schedule:
    # Run at 05:00 UTC every day
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'Sync mode: pr (create PR) or direct (direct push)'
        required: false
        default: 'pr'
        type: choice
        options:
          - pr
          - direct

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/bin64/Mono-Dash.git
          git fetch upstream main

      - name: Check for changes
        id: check
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new changes from upstream."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected. Local: $LOCAL, Upstream: $UPSTREAM"
          fi

      - name: Direct merge (direct mode)
        if: steps.check.outputs.has_changes == 'true' && github.event.inputs.sync_mode == 'direct'
        run: |
          git checkout main
          git merge upstream/main --no-edit || {
            echo "::error::Merge conflict detected. Switching to PR mode."
            exit 1
          }
          git push origin main

      - name: Create sync branch, merge and push (pr mode)
        if: steps.check.outputs.has_changes == 'true' && (github.event.inputs.sync_mode != 'direct' || github.event_name == 'schedule')
        id: pr
        run: |
          SYNC_BRANCH="sync-upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$SYNC_BRANCH"
          git merge upstream/main --no-edit || {
            echo "has_conflict=true" >> $GITHUB_OUTPUT
            echo "::error::Merge conflict detected. Creating issue."
            exit 1
          }
          git push origin "$SYNC_BRANCH"
          PR_URL=$(gh pr create --base main --head "$SYNC_BRANCH" --title "chore: sync upstream changes from bin64/Mono-Dash" --body "This PR syncs the latest changes from the upstream repository.

- Upstream: bin64/Mono-Dash
- Branch: main
- Synced at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" --label upstream-sync)
          echo "branch=$SYNC_BRANCH" >> $GITHUB_OUTPUT
          echo "has_conflict=false" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Create issue on conflict
        if: failure() && steps.pr.outputs.has_conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Conflict detected during upstream sync',
              body: `Automatic upstream sync failed due to merge conflicts.\n\nPlease resolve manually:\n\n\`\`\`bash\ngit fetch upstream\ngit checkout main\ngit merge upstream/main\n# resolve conflicts...\ngit push origin main\n\`\`\``,
              labels: ['upstream-sync', 'conflict']
            })